name: Screenshot

permissions:
  contents: write

on:
  # Every 10 min, offset off :00 — GitHub delays/drops runs scheduled at the top
  # of the hour, and missed scheduled runs are never backfilled.
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Take screenshot
        run: node index.js

      # Commit the scraper's output back to the repo (repo-as-database).
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git add texts.json
          git add screenshot-links.json
          git commit -m "Just nu: 📸" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
