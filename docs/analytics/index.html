<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --border: #d6e2f5;
      --text: #10213f;
      --muted: #5b6f95;
      --accent-2: #3e75dc;
      --shadow: 0 8px 22px rgba(38, 72, 130, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top right, #dce8ff 0, var(--bg) 44%);
      color: var(--text);
      line-height: 1.45;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem;
      box-shadow: var(--shadow);
      animation: fadeIn .6s ease;
    }

    .card h2,
    .card h3 {
      margin: 0 0 0.6rem;
      font-size: 1rem;
    }

    .card-title {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }

    .metric {
      font-size: clamp(1.2rem, 2.6vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .overview-text {
      font-size: .92rem;
      line-height: 1.35;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .metric-button {
      border: 0;
      background: transparent;
      color: var(--accent-2);
      font: inherit;
      font-weight: inherit;
      padding: 0;
      cursor: pointer;
      text-decoration: none;
    }

    .metric-button:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.85;
    }

    .card-action {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .muted {
      color: var(--muted);
    }

    .word-list {
      display: grid;
      gap: .4rem;
    }

    .word-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .8rem;
      align-items: center;
      font-size: .9rem;
      padding: .35rem 0;
      border: 0;
      border-bottom: 1px solid #d6e2f5;
      cursor: pointer;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      width: 100%;
    }

    .word-item:last-child {
      border-bottom: none;
    }

    .word-name {
      color: var(--text);
      text-decoration: none;
      transition: text-decoration .15s ease;
    }

    .word-item:hover .word-name {
      text-decoration: underline;
    }

    .word-count {
      color: var(--muted);
      font-size: .85rem;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: .48rem;
    }

    .tag {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f5f9ff;
      padding: .23rem .56rem;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      line-height: 1;
    }

    .tag-button {
      color: inherit;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
    }

    .tag-button:hover {
      text-decoration: underline;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-bottom: .6rem;
    }

    .controls input {
      background: #f8fbff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .52rem .68rem;
      min-width: 180px;
    }

    .texts {
      display: grid;
      gap: .45rem;
      max-height: 33vh;
      overflow: auto;
      padding-right: .18rem;
    }

    .text-item {
      background: #f8fbff;
      border: 1px solid #d6e2f5;
      border-radius: 10px;
      padding: .56rem .62rem;
    }

    .score-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-top: .35rem;
    }

    .chip {
      font-size: .75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: .15rem .46rem;
      color: var(--muted);
      background: #eef4ff;
    }

    .error {
      border: 1px solid #5c2335;
      background: #2d1320;
      color: #ffc3d0;
      border-radius: 12px;
      padding: .8rem;
      white-space: pre-wrap;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      .word-item {
        font-size: .85rem;
      }
    }

    .legend-item {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      gap: .5rem;
      align-items: center;
      font-size: .88rem;
      padding: .25rem 0;
      border-bottom: 1px solid #d6e2f5;
    }

    .legend-item:last-child {
      border-bottom: none;
    }

    .legend-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <main>
    <section id="overview" class="grid"></section>
    <section id="overviewLengths" class="grid"></section>

    <section id="emotions" class="card">
      <h2>Känsoläge</h2>
      <div id="emotionChart"></div>
    </section>

    <section id="texts" class="card">
      <h2>Sök</h2>
      <div class="controls">
        <input id="searchInput" type="search" placeholder="Just nu:" />
      </div>
      <div id="textList" class="texts"></div>
      <p id="textCount" class="muted"></p>
    </section>

    <section id="words" class="grid">
      <article class="card">
        <h2>Vanligaste orden</h2>
        <div id="topWords" class="word-list"></div>
      </article>
      <article class="card">
        <h2>Ord <span class="muted" style="font-size:.8rem;font-weight:400">(nyast först)</span></h2>
        <div id="uniqueWords" class="tag-cloud"></div>
      </article>
    </section>
  </main>

  <script>
    const EMOTION_CLASSIFICATION = {
      "fear": [
        "attack", "skottlossning", "explosion", "bomb", "terror", "hot",
        "kniv", "skjuten", "granat", "krig", "drönarattack", "vapenvila bruten"
      ],
      "sadness": [
        "död", "döda", "avliden", "omkom", "hittad död",
        "drunkning", "förlust", "dog", "dödsfall"
      ],
      "anxiety": [
        "försvunnen", "saknas", "sökinsats", "larm", "risk",
        "varning", "beordras", "evakuera", "misstänkt",
        "oklart", "oro", "hotad"
      ],
      "anger": [
        "misshandel", "rån", "våldtäkt", "överfall",
        "skadad av våld", "hatbrott", "attack mot",
        "brott", "gripen", "anhållen", "åtalas"
      ],
      "shock": [
        "explosion", "kraftig brand", "katastrof", "masskrock",
        "skolskjutning", "flygkrasch", "ras", "kollaps",
        "stor olycka", "tragisk"
      ],
      "stress": [
        "trafikstopp", "avstängd", "förseningar", "kaos",
        "störningar", "elnät nere", "systemfel",
        "överbelastning", "köer"
      ],
      "fear_for_safety": [
        "brand", "brinner", "skogsbrand", "rök",
        "gasläcka", "smitta", "sjukdom", "förgiftning",
        "utbrott", "bakterier"
      ],
      "relief": [
        "räddad", "hittad vid liv", "kontrollerad",
        "stabilt läge", "faran över", "återställd",
        "tillbaka i drift"
      ],
      "joy": [
        "vann", "seger", "guld", "rekord",
        "finalvinst", "mästare", "succé"
      ],
      "surprise": [
        "ovanlig", "sällsynt", "första gången",
        "plötsligt", "oväntat"
      ],
      "neutral_information": [
        "möte", "beslut", "rapport", "överens",
        "förhandling", "avtal", "presenterar",
        "policy", "utredning"
      ]
    }
    const STOPWORDS = new Set([
      'just', 'nu', 'och', 'att', 'som', 'det', 'den', 'en', 'ett', 'på', 'av', 'för', 'med', 'till', 'i', 'om', 'är', 'har', 'efter', 'mot', 'från',
      'två', 'flera', 'stor', 'nya', 'ny', 'man', 'kvinna', 'person', 'uppgifter', 'uppgift', 'stopp', 'stoppad', 'avstängd', 'de', 'då'
    ]);

    const MAX_DISPLAYED_TEXTS = 100;
    const MAX_EXTRACTION_DEPTH = 6;

    const escapeHtml = (s) => s
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    function normalizeText(input) {
      return String(input || '')
        .replace(/\s+/g, ' ')
        .replace(/^just nu:\s*/i, '')
        .trim();
    }

    function tokenize(text) {
      return normalizeText(text)
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\s-]+/gu, ' ')
        .split(/\s+/)
        .map(w => w.replace(/^-+|-+$/g, ''))
        .filter(w => w.length > 1 && !STOPWORDS.has(w));
    }

    function extractTexts(value, out = [], seen = new Set(), depth = 0) {
      if (depth > MAX_EXTRACTION_DEPTH || value == null) return out;
      if (typeof value === 'string') {
        const cleaned = normalizeText(value);
        if (cleaned) out.push(cleaned);
        return out;
      }
      if (typeof value !== 'object') return out;
      if (seen.has(value)) return out;
      seen.add(value);

      if (Array.isArray(value)) {
        for (const item of value) extractTexts(item, out, seen, depth + 1);
        return out;
      }

      const knownKeys = ['text', 'title', 'headline', 'message', 'name', 'value'];
      let usedKnown = false;
      for (const key of knownKeys) {
        if (typeof value[key] === 'string') {
          extractTexts(value[key], out, seen, depth + 1);
          usedKnown = true;
        }
      }
      if (!usedKnown) {
        for (const v of Object.values(value)) extractTexts(v, out, seen, depth + 1);
      }
      return out;
    }

    async function fetchDataset() {
      const url = 'https://raw.githubusercontent.com/karlerikjonatan/sr-just-nu/main/texts.json';
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`Could not load data from ${url} (${res.status})`);
      const json = await res.json();
      const texts = [...new Set(extractTexts(json).map(normalizeText).filter(Boolean))];
      return { texts };
    }

    function classifyEmotions(lc) {
      const matched = [];
      for (const [emotion, keywords] of Object.entries(EMOTION_CLASSIFICATION)) {
        if (keywords.some(kw => lc.includes(kw))) matched.push(emotion);
      }
      return matched;
    }

    function computeAnalytics(texts) {
      const items = texts.map((text, index) => {
        const cleaned = normalizeText(text);
        return {
          index,
          text: cleaned,
          lc: cleaned.toLowerCase(),
          tokens: tokenize(cleaned)
        };
      });

      const freq = new Map();
      for (const item of items) {
        for (const token of item.tokens) {
          const entry = freq.get(token) || { count: 0, lastIndex: 0 };
          freq.set(token, { count: entry.count + 1, lastIndex: item.index });
        }
      }
      const topWords = [...freq.entries()]
        .map(([w, { count }]) => [w, count])
        .sort((a, b) => b[1] - a[1]);
      const uniqueWords = [...freq.entries()]
        .filter(([, { count }]) => count === 1)
        .sort((a, b) => b[1].lastIndex - a[1].lastIndex)
        .map(([w]) => w);

      const uniqueWordLastIndex = Object.fromEntries(
        [...freq.entries()].filter(([, { count }]) => count === 1).map(([w, { lastIndex }]) => [w, lastIndex])
      );
      const totalWordCount = [...freq.values()].reduce((sum, { count }) => sum + count, 0);

      const emotionCounts = new Map();
      for (const item of items) {
        for (const emotion of classifyEmotions(item.lc)) {
          emotionCounts.set(emotion, (emotionCounts.get(emotion) || 0) + 1);
        }
      }

      return {
        items,
        topWords,
        uniqueWords,
        uniqueWordCount: freq.size,
        uniqueWordLastIndex,
        totalWordCount,
        emotionCounts
      };
    }

    const EMOTION_COLORS = {
      fear: '#c0392b',
      sadness: '#4a90d9',
      anxiety: '#7b5ea7',
      anger: '#e74c3c',
      shock: '#e67e22',
      stress: '#f39c12',
      fear_for_safety: '#d35400',
      relief: '#27ae60',
      joy: '#f1c40f',
      surprise: '#1abc9c',
      neutral_information: '#7f8c8d'
    };

    const EMOTION_LABELS = {
      fear: 'Rädsla',
      sadness: 'Sorg',
      anxiety: 'Ångest',
      anger: 'Ilska',
      shock: 'Chock',
      stress: 'Stress',
      fear_for_safety: 'Fara',
      relief: 'Lättnad',
      joy: 'Glädje',
      surprise: 'Förvåning',
      neutral_information: 'Neutral information'
    };

    function renderPieChart(containerId, emotionCounts) {
      const container = document.getElementById(containerId);
      const entries = [...emotionCounts.entries()].sort((a, b) => b[1] - a[1]);
      const total = entries.reduce((s, [, c]) => s + c, 0);
      if (!total) {
        container.innerHTML = '<p class="muted">No data.</p>';
        return;
      }

      const cx = 100, cy = 100, r = 90;
      let angle = -Math.PI / 2;

      const paths = entries.map(([emotion, count]) => {
        const slice = (count / total) * 2 * Math.PI;
        const x1 = cx + r * Math.cos(angle);
        const y1 = cy + r * Math.sin(angle);
        angle += slice;
        const x2 = cx + r * Math.cos(angle);
        const y2 = cy + r * Math.sin(angle);
        const large = slice > Math.PI ? 1 : 0;
        const color = EMOTION_COLORS[emotion] || '#aaa';
        return `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color}" title="${escapeHtml(EMOTION_LABELS[emotion] || emotion)}: ${count}"/>`;
      });

      const legend = entries.map(([emotion, count]) => {
        const pct = ((count / total) * 100).toFixed(1);
        const color = EMOTION_COLORS[emotion] || '#aaa';
        return `<div class="legend-item">
          <span class="legend-color" style="background:${color}"></span>
          <span class="legend-label">${escapeHtml(EMOTION_LABELS[emotion] || emotion)}</span>
          <span class="word-count">${count} (${pct}%)</span>
        </div>`;
      }).join('');

      container.innerHTML = `
        <div style="display:flex;flex-wrap:wrap;gap:1.2rem;align-items:flex-start">
          <svg viewBox="0 0 200 200" width="180" height="180" style="flex-shrink:0">${paths.join('')}</svg>
          <div class="word-list" style="flex:1;min-width:180px">${legend}</div>
        </div>
      `;
    }

    function setSearchAndScroll(term) {
      const search = document.getElementById('searchInput');
      const section = document.getElementById('texts');
      if (!search || !section) return;

      const value = normalizeText(term);
      if (!value) return;

      search.value = value;
      search.dispatchEvent(new Event('input', { bubbles: true }));
      section.scrollIntoView({ behavior: 'auto', block: 'start' });
      search.focus({ preventScroll: true });
    }

    function bindWordPicker(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.addEventListener('click', (event) => {
        const target = event.target.closest('[data-search-term]');
        if (!target || !container.contains(target)) return;
        setSearchAndScroll(target.getAttribute('data-search-term'));
      });
    }

    function renderWordList(containerId, rows, totalCount = 0) {
      const container = document.getElementById(containerId);
      if (!rows.length) {
        container.innerHTML = '<p class="muted">No data.</p>';
        return;
      }
      container.innerHTML = rows.map(r => `
        <button type="button" class="word-item" data-search-term="${escapeHtml(r.label)}">
          <div class="word-name">${escapeHtml(r.label)}</div>
          <div class="word-count">${r.value} (${totalCount ? ((r.value / totalCount) * 100).toFixed(1) : '0.0'}%)</div>
        </button>
      `).join('');
    }

    function renderTags(containerId, values, lastIndexMap = {}) {
      const c = document.getElementById(containerId);
      c.innerHTML = values.map(v => {
        const idx = lastIndexMap[v];
        const title = idx != null ? ` title="Text #${idx + 1}"` : '';
        return `<button type="button" class="tag tag-button" data-search-term="${escapeHtml(v)}"${title}>${escapeHtml(v)}</button>`;
      }).join('');
    }

    function pickRandomWord(topWords) {
      return topWords.length
        ? topWords[Math.floor(Math.random() * topWords.length)][0]
        : '';
    }

    function refreshRandomWord(topWords) {
      const metricButton = document.getElementById('randomWordMetric');
      if (!metricButton) return;

      const randomWord = pickRandomWord(topWords);
      metricButton.textContent = randomWord || '—';
      metricButton.setAttribute('data-search-term', randomWord || '');
    }

    function renderOverview(texts, a) {
      const randomWord = pickRandomWord(a.topWords);
      const displayWord = randomWord || '—';
      const longestText = texts.reduce((longest, current) => current.length > longest.length ? current : longest, '');
      const shortestText = texts.reduce((shortest, current) => {
        if (!current) return shortest;
        if (!shortest) return current;
        return current.length < shortest.length ? current : shortest;
      }, '');

      document.getElementById('overview').innerHTML = `
        <article class="card">
          <h3>Totalt antal texter</h3>
          <div class="metric">${escapeHtml(String(texts.length))}</div>
        </article>
        <article class="card">
          <h3>Unika ord</h3>
          <div class="metric">${escapeHtml(String(a.uniqueWordCount.toLocaleString()))}</div>
        </article>
        <article class="card">
          <h3 class="card-title">Slumpat ord <button type="button" id="refreshRandomWord" class="card-action" aria-label="Visa nytt slumpat ord" title="Visa nytt slumpat ord">🔄</button></h3>
          <div class="metric"><button type="button" id="randomWordMetric" class="metric-button" data-search-term="${escapeHtml(randomWord)}">${escapeHtml(String(displayWord))}</button></div>
        </article>
      `;

      document.getElementById('overviewLengths').innerHTML = `
        <article class="card">
          <h3>Kortaste text</h3>
          <div class="overview-text">${escapeHtml(shortestText || '—')}</div>
        </article>
        <article class="card">
          <h3>Längsta text</h3>
          <div class="overview-text">${escapeHtml(longestText || '—')}</div>
        </article>
      `;

      const refreshButton = document.getElementById('refreshRandomWord');
      if (refreshButton) {
        refreshButton.addEventListener('click', () => refreshRandomWord(a.topWords));
      }
    }

    function renderExplorer(items) {
      const list = document.getElementById('textList');
      const search = document.getElementById('searchInput');
      const count = document.getElementById('textCount');
      const newestFirstItems = [...items].reverse();

      function draw() {
        const q = search.value.trim().toLowerCase();
        const rows = newestFirstItems.filter(item => !q || item.lc.includes(q));

        const capped = rows.slice(0, MAX_DISPLAYED_TEXTS);
        list.innerHTML = capped.map(item => `
          <article class="text-item">
            <div>${escapeHtml(item.text)}</div>
            <div class="score-chips">
              <span class="chip">#${item.index + 1}</span>
            </div>
          </article>
        `).join('');
        count.textContent = `Visar ${capped.length} av ${rows.length} matchande texter.`;
      }

      search.addEventListener('input', draw);
      draw();
    }

    function renderAll(texts, analytics) {
      renderExplorer(analytics.items);
      renderOverview(texts, analytics);
      renderPieChart('emotionChart', analytics.emotionCounts);
      renderWordList('topWords', analytics.topWords.map(([label, value]) => ({ label, value })), analytics.totalWordCount);
      renderTags('uniqueWords', analytics.uniqueWords, analytics.uniqueWordLastIndex);
    }

    async function main() {
      try {
        bindWordPicker('overview');
        bindWordPicker('topWords');
        bindWordPicker('uniqueWords');
        const { texts } = await fetchDataset();
        const analytics = computeAnalytics(texts);
        renderAll(texts, analytics);
      } catch (err) {
        document.getElementById('overview').innerHTML = '<div class="error">' + escapeHtml(err.message || String(err)) + '</div>';
      }
    }

    main();
  </script>
</body>

</html>
