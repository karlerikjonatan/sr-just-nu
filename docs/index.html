<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B8%3C/text%3E%3C/svg%3E"><title>Just nu:</title><style>*{margin:0;padding:0}img{display:block;height:auto;max-width:100%}body{display:flex;flex-direction:column;gap:0.25rem;padding:0.25rem}a{display:block}#sentinel{height:1px}</style></head><body><div id="gallery"></div><div id="sentinel"></div><script>
(function () {
  var BATCH = 100;
  var gallery = document.getElementById('gallery');
  var sentinel = document.getElementById('sentinel');
  var items = [];
  var cursor = 0;

  function renderBatch() {
    var end = Math.min(cursor + BATCH, items.length);
    var frag = document.createDocumentFragment();
    for (; cursor < end; cursor++) {
      var item = items[cursor];
      var img = document.createElement('img');
      img.setAttribute('src', 'screenshots/' + item.f);
      img.setAttribute('loading', 'lazy');
      img.setAttribute('width', '768');
      img.setAttribute('height', '32');
      if (item.href) {
        var a = document.createElement('a');
        a.setAttribute('href', item.href);
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
        a.appendChild(img);
        frag.appendChild(a);
      } else {
        frag.appendChild(img);
      }
    }
    gallery.appendChild(frag);
    if (cursor >= items.length) observer.disconnect();
  }

  var observer = new IntersectionObserver(function (entries) {
    if (entries[0].isIntersecting && cursor < items.length) renderBatch();
  });

  fetch('screenshots.json', { cache: 'no-cache' })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      items = data;
      renderBatch();
      observer.observe(sentinel);
    })
    .catch(function (err) { console.error('Could not load screenshots.json', err); });
})();
</script></body></html>
